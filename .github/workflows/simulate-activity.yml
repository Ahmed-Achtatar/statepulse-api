name: Programmatic x402 Activity Simulator

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day (twice a day)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'buyer/package-lock.json'

      - name: Install Buyer Dependencies
        run: |
          cd buyer
          npm ci || npm install

      - name: Run Simulator
        env:
          EVM_PRIVATE_KEY: ${{ secrets.EVM_PRIVATE_KEY }}
        run: |
          cd buyer
          node simulate.mjs
