# Smithery.ai MCP Server Configuration
# This file lets automated registries build, install, and run StatePulse MCP.

startCommand:
  type: "http"
  command: "npm"
  args: ["run", "dev"]

configSchema:
  type: "object"
  required: []
  properties:
    WALLET_ADDRESS:
      type: "string"
      title: "Wallet Address"
      description: "EVM-compatible wallet address on Base to receive pay-per-call USDC payments."
    CDP_API_KEY_ID:
      type: "string"
      title: "Coinbase CDP API Key ID"
      description: "Coinbase Developer Platform API Key ID for x402 settlement."
    CDP_API_KEY_SECRET:
      type: "string"
      title: "Coinbase CDP API Key Secret"
      description: "Coinbase Developer Platform API Key Secret."

exampleConfig:
  WALLET_ADDRESS: "0x4a82F147c8A4339409C9097Adc1EedFd56E85bFE"
